<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VibeLink | Real Connections</title>
  <style>
    :root {
      --pink: #ff4d94;
      --pink-gradient: linear-gradient(135deg, #ff4d94 0%, #d9367f 100%);
      --gold: #ffcf4d;
      --text-dark: #2d2d2d;
      --bg-light: #fff5f8;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body { background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; line-height: 1.6; }

    /* Navigation */
    nav {
      padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
      position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--glass); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 77, 148, 0.1);
    }
    .logo { font-size: 1.6rem; font-weight: 800; color: #d9367f; text-decoration: none; letter-spacing: -1px; }

    /* Hero Section */
    .hero {
      padding: 160px 5% 80px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 50px;
      max-width: 1200px; margin: 0 auto;
    }
    .hero-content h1 { font-size: 4rem; line-height: 1.1; margin-bottom: 24px; }
    .hero-content h1 span { color: var(--pink); }
    .hero-content p { font-size: 1.25rem; color: #555; margin-bottom: 32px; }

    /* Get Started Section (The PC-to-Mobile Bridge) */
    .get-started {
      background: white; border-radius: 30px; padding: 40px; border: 1px solid rgba(255, 77, 148, 0.2);
      display: flex; align-items: center; gap: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
    }
    .qr-placeholder {
      width: 120px; height: 120px; background: #f0f0f0; border: 4px solid var(--gold);
      border-radius: 15px; display: flex; align-items: center; text-align: center; font-size: 0.7rem; color: #999;
    }

    /* Buttons */
    .btn {
      padding: 14px 28px; border-radius: 50px; text-decoration: none; font-weight: 700;
      transition: all 0.3s ease; display: inline-block; border: none; cursor: pointer;
    }
    .btn-pink { background: var(--pink-gradient); color: white; box-shadow: 0 10px 20px rgba(255, 77, 148, 0.3); }
    .btn-pink:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 77, 148, 0.4); }

    /* Profile Cards (Animations) */
    .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    .phone-mockup {
      position: relative; width: 300px; height: 600px; background: #2d2d2d;
      border: 8px solid #1a1a1a; border-radius: 40px; margin: 0 auto;
      box-shadow: 0 50px 100px rgba(0,0,0,0.2);
    }
    .phone-screen {
      width: 100%; height: 100%; border-radius: 30px; overflow: hidden;
      background: linear-gradient(to bottom, #ff4d94, #ffcf4d);
      display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
    }

    footer { padding: 60px 5%; text-align: center; background: white; border-top: 1px solid #eee; }
    footer a { margin: 0 15px; color: #888; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; }
    footer a:hover { color: var(--pink); }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .get-started { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">VibeLink</a>
    <a href="mailto:hellovibelink@gmail.com" class="btn btn-pink">Support</a>
  </nav>

  <section class="hero">
    <div class="hero-content reveal">
      <h1>Real Vibes.<br><span>Real Local.</span></h1>
      <p>The first dating app that prioritizes your energy over your bio. Ready to find your match?</p>
      
      <div class="get-started">
        <div class="qr-placeholder">Scan to<br>Download App</div>
        <div>
          <p style="font-weight: bold; margin-bottom: 10px;">Get the app on your phone</p>
          <div style="display: flex; gap: 10px;">
             <div style="background:#000; color:white; padding:8px 15px; border-radius:8px; font-size:0.8rem">App Store</div>
             <div style="background:#000; color:white; padding:8px 15px; border-radius:8px; font-size:0.8rem">Google Play</div>
          </div>
        </div>
      </div>
    </div>

    <div class="hero-visual reveal">
      <div class="phone-mockup">
        <div class="phone-screen">VibeLink UI</div>
      </div>
    </div>
  </section>

  <footer>
    <p style="margin-bottom: 20px; color:#bbb;">© 2026 VibeLink. All rights reserved.</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </footer>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
