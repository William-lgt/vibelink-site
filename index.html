<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VibeLink | Real Connections</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff4d94;
      --pink-gradient: linear-gradient(135deg, #ff4d94 0%, #d9367f 100%);
      --gold: #ffcf4d;
      --text-dark: #2d2d2d;
      --bg-light: #fff5f8;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; line-height: 1.6; }

    /* Navigation */
    nav {
      padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
      position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--glass); backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 77, 148, 0.1);
    }
    .logo { font-size: 1.6rem; font-weight: 800; color: #d9367f; text-decoration: none; letter-spacing: -1px; }

    /* Hero Section */
    .hero {
      padding: 160px 5% 80px; display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 50px;
      max-width: 1200px; margin: 0 auto; min-height: 100vh;
    }
    .hero-content h1 { font-size: clamp(2.5rem, 5vw, 4.5rem); line-height: 1.1; margin-bottom: 24px; }
    .hero-content h1 span { color: var(--pink); position: relative; z-index: 1; }
    .hero-content h1 span::after {
      content: ''; position: absolute; bottom: 5px; left: 0; width: 100%; height: 12px;
      background: var(--gold); opacity: 0.3; z-index: -1;
    }
    .hero-content p { font-size: 1.25rem; color: #555; margin-bottom: 32px; }

    /* Get Started (PC Bridge) */
    .get-started {
      background: var(--white); border-radius: 24px; padding: 30px;
      display: flex; align-items: center; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid rgba(255, 77, 148, 0.1);
    }
    .qr-code {
      width: 100px; height: 100px; background: #eee; border-radius: 12px;
      display: flex; align-items: center; text-align: center; font-size: 0.7rem; color: #888;
      border: 2px solid var(--gold);
    }
    .store-badges { display: flex; flex-direction: column; gap: 8px; }
    .badge {
      background: #000; color: white; padding: 8px 16px; border-radius: 8px;
      font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .badge:hover { transform: translateY(-2px); background: #222; }

    /* Floating Phone Mockup */
    .phone-mockup {
      width: 280px; height: 580px; background: #1a1a1a; border: 10px solid #2d2d2d;
      border-radius: 40px; margin: 0 auto; box-shadow: 0 40px 80px rgba(0,0,0,0.1);
      position: relative; animation: float 5s ease-in-out infinite; overflow: hidden;
    }
    .screen {
      width: 100%; height: 100%; background: var(--pink-gradient);
      display: flex; align-items: center; justify-content: center; color: white; font-weight: 800;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

    /* Reveal animations */
    .reveal { opacity: 0; transform: translateY(30px); transition: 0.8s all ease-out; }
    .reveal.active { opacity: 1; transform: translateY(0); }

    footer { padding: 60px 5%; text-align: center; background: white; border-top: 1px solid #eee; }
    footer a { margin: 0 15px; color: #888; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
    footer a:hover { color: var(--pink); }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; text-align: center; padding-top: 120px; }
      .get-started { flex-direction: column; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">VibeLink</a>
    <a href="mailto:hellovibelink@gmail.com" style="color: var(--pink); text-decoration: none; font-weight: 700;">Support</a>
  </nav>

  <section class="hero">
    <div class="hero-content reveal">
      <h1>The Dating App with <span>Real Vibe.</span></h1>
      <p>Connect with local people based on energy, not just photos. Join VibeLink today.</p>
      
      <div class="get-started">
        <div class="qr-code">Scan to<br>Download</div>
        <div class="store-badges">
          <p style="font-weight: 700; font-size: 0.9rem;">Get the Mobile App</p>
          <div class="badge">App Store</div>
          <div class="badge">Google Play</div>
        </div>
      </div>
    </div>

    <div class="reveal">
      <div class="phone-mockup">
        <div class="screen">VibeLink UI</div>
      </div>
    </div>
  </section>

  <footer>
    <p style="margin-bottom: 20px; color: #bbb;">© 2026 VibeLink. All rights reserved.</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </footer>

  <script>
    // Scroll reveal logic
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) entry.target.classList.add('active');
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  </script>
</body>
</html>
